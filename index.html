<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Enigma #1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050508">
    <title>🎯 Enigma #1</title>
    <link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Enigma Game - Riddle 1&quot;,&quot;short_name&quot;:&quot;Enigma 1&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;fullscreen&quot;,&quot;orientation&quot;:&quot;portrait&quot;,&quot;background_color&quot;:&quot;#050508&quot;,&quot;theme_color&quot;:&quot;#050508&quot;}">
    <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --bg-card: #0a0a10;
            --surface: #0f0f18;
            --cyan: #00ffd5;
            --cyan-dim: rgba(0, 255, 213, 0.15);
            --magenta: #ff2d78;
            --magenta-dim: rgba(255, 45, 120, 0.15);
            --violet: #8b5cf6;
            --gold: #fbbf24;
            --text: #c8d6e5;
            --text-dim: #4a5568;
            --text-bright: #f0f4f8;
            --border: rgba(0, 255, 213, 0.08);
            --glow-cyan: 0 0 40px rgba(0, 255, 213, 0.4);
            --glow-magenta: 0 0 40px rgba(255, 45, 120, 0.4);
            --radius: 16px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow-x: hidden; scroll-behavior: smooth; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh; min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* === CANVAS BACKGROUND === */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        /* === NOISE GRAIN OVERLAY === */
        .grain {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: 1;
            pointer-events: none; opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            animation: grainShift 0.5s steps(1) infinite;
        }
        @keyframes grainShift {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-5%, 5%); }
            50% { transform: translate(5%, -5%); }
            75% { transform: translate(-5%, -5%); }
            100% { transform: translate(5%, 5%); }
        }

        /* === VIGNETTE === */
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
        }

        /* === SCAN LINE (subtle) === */
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            pointer-events: none; opacity: 0.04;
            background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
        }

        /* === HUD CORNERS === */
        .hud-corner {
            position: fixed; z-index: 100; width: 40px; height: 40px; pointer-events: none;
        }
        .hud-corner::before, .hud-corner::after {
            content: ''; position: absolute; background: var(--cyan); opacity: 0.3;
        }
        .hud-corner.tl { top: 15px; left: 15px; }
        .hud-corner.tl::before { top: 0; left: 0; width: 20px; height: 1px; }
        .hud-corner.tl::after { top: 0; left: 0; width: 1px; height: 20px; }
        .hud-corner.tr { top: 15px; right: 15px; }
        .hud-corner.tr::before { top: 0; right: 0; width: 20px; height: 1px; }
        .hud-corner.tr::after { top: 0; right: 0; width: 1px; height: 20px; }
        .hud-corner.bl { bottom: 15px; left: 15px; }
        .hud-corner.bl::before { bottom: 0; left: 0; width: 20px; height: 1px; }
        .hud-corner.bl::after { bottom: 0; left: 0; width: 1px; height: 20px; }
        .hud-corner.br { bottom: 15px; right: 15px; }
        .hud-corner.br::before { bottom: 0; right: 0; width: 20px; height: 1px; }
        .hud-corner.br::after { bottom: 0; right: 0; width: 1px; height: 20px; }

        /* === TOP BAR === */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 24px; padding-top: calc(18px + env(safe-area-inset-top));
            background: linear-gradient(180deg, rgba(5,5,8,0.95) 0%, transparent 100%);
        }
        .top-bar-left { display: flex; align-items: center; gap: 10px; }
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%; background: var(--cyan);
            box-shadow: 0 0 8px var(--cyan); animation: dotPulse 2s ease-in-out infinite;
        }
        @keyframes dotPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .status-label {
            font-family: 'Syne Mono', monospace; font-size: 0.65rem; letter-spacing: 3px;
            text-transform: uppercase; color: var(--text-dim);
        }
        .top-bar-right { display: flex; gap: 12px; }
        .icon-btn {
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
            background: rgba(10, 10, 16, 0.8); color: var(--text-dim); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
            transition: all 0.3s ease; touch-action: manipulation; backdrop-filter: blur(10px);
        }
        .icon-btn:active { transform: scale(0.9); }
        .icon-btn.active { border-color: var(--cyan); color: var(--cyan); box-shadow: var(--glow-cyan); }

        /* === MAIN CONTAINER === */
        .main {
            position: relative; z-index: 10; min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 80px 20px 40px;
        }

        /* === INTRO PANEL === */
        .panel {
            width: 100%; max-width: 560px; position: relative;
        }
        .panel-frame {
            position: relative; padding: 48px 32px;
            background: linear-gradient(145deg, rgba(10,10,16,0.9), rgba(5,5,8,0.95));
            border: 1px solid var(--border); border-radius: var(--radius);
            backdrop-filter: blur(20px); overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
        }
        .panel-frame::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            opacity: 0.4;
        }
        .panel-frame::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,255,213,0.03), transparent);
            animation: panelSweep 6s linear infinite;
        }
        @keyframes panelSweep { 0% { left: -60%; } 100% { left: 160%; } }

        /* === PAGE INDICATOR === */
        .page-indicator {
            display: flex; gap: 6px; justify-content: center; margin-bottom: 32px;
        }
        .page-dot {
            width: 24px; height: 2px; border-radius: 1px;
            background: var(--text-dim); opacity: 0.3; transition: all 0.5s ease;
        }
        .page-dot.active { background: var(--cyan); opacity: 1; width: 40px; box-shadow: 0 0 10px var(--cyan); }
        .page-dot.done { background: var(--cyan); opacity: 0.5; }

        /* === TEXT DISPLAY === */
        .text-display {
            min-height: 180px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
        .typewriter {
            font-family: 'Outfit', sans-serif; font-size: clamp(1.05rem, 3.5vw, 1.25rem);
            line-height: 2; color: var(--text); font-weight: 300; letter-spacing: 0.02em;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .typewriter.visible { opacity: 1; }
        .typewriter .char {
            display: inline-block; opacity: 0; transform: translateY(8px); filter: blur(4px);
            transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .typewriter .char.revealed { opacity: 1; transform: translateY(0); filter: blur(0); }
        .typewriter .char.space { width: 0.3em; }
        .typewriter .char.break { display: block; height: 0.5em; width: 100%; }

        /* Welcome title */
        .welcome-title {
            font-family: 'Outfit', sans-serif; font-weight: 800;
            font-size: clamp(2.5rem, 10vw, 4.5rem); letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--cyan) 0%, #fff 40%, var(--magenta) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            filter: drop-shadow(0 0 30px rgba(0,255,213,0.3));
            opacity: 0; transform: scale(0.8); transition: all 1s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .welcome-title.visible { opacity: 1; transform: scale(1); }

        /* Final question */
        .final-q {
            font-family: 'Outfit', sans-serif; font-weight: 700;
            font-size: clamp(1.5rem, 6vw, 2.5rem); letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--cyan), var(--violet));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            filter: drop-shadow(0 0 20px rgba(139,92,246,0.4));
        }

        /* === RIDDLE LABEL === */
        .riddle-label {
            display: none; font-family: 'Syne Mono', monospace; font-size: 0.6rem;
            letter-spacing: 5px; text-transform: uppercase; color: var(--cyan);
            text-align: center; margin-bottom: 24px; opacity: 0;
            transition: all 0.5s ease;
        }
        .riddle-label.visible { display: block; opacity: 0.6; }
        .riddle-label::before, .riddle-label::after { content: '───  '; }
        .riddle-label::after { content: '  ───'; }

        /* === PROGRESS === */
        .progress-track {
            width: 100%; max-width: 200px; margin: 28px auto 0; height: 2px;
            background: rgba(255,255,255,0.05); border-radius: 1px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; width: 0%; border-radius: 1px;
            background: linear-gradient(90deg, var(--cyan), var(--violet));
            transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 0 12px var(--cyan);
        }

        /* === NAV BUTTON === */
        .nav-btn {
            margin-top: 36px; padding: 16px 48px; border: none; border-radius: 60px;
            font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 600;
            letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
            color: var(--bg); background: var(--cyan); position: relative; overflow: hidden;
            transition: all 0.3s ease; touch-action: manipulation;
            box-shadow: 0 0 30px rgba(0,255,213,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .nav-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }
        .nav-btn:hover::before { left: 100%; }
        .nav-btn:active { transform: scale(0.96); }

        .nav-btn.start-btn {
            background: linear-gradient(135deg, var(--cyan), var(--violet));
            padding: 20px 64px; font-size: 0.95rem;
            box-shadow: 0 0 40px rgba(0,255,213,0.4), 0 0 80px rgba(139,92,246,0.2);
            animation: btnGlow 3s ease-in-out infinite;
        }
        @keyframes btnGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(0,255,213,0.3), 0 0 60px rgba(139,92,246,0.15); }
            50% { box-shadow: 0 0 50px rgba(0,255,213,0.5), 0 0 100px rgba(139,92,246,0.3); }
        }

        /* === CARDS === */
        .cards-wrapper {
            width: 100%; max-width: 1000px; margin-top: 32px;
            opacity: 0; transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .cards-wrapper.visible { opacity: 1; transform: translateY(0); }

        .cards-grid {
            display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 24px;
        }

        .card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 16px; cursor: pointer; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative; overflow: hidden; touch-action: manipulation; user-select: none;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--card-accent), transparent); opacity: 0.5;
        }
        .card::after {
            content: ''; position: absolute; inset: 0; border-radius: var(--radius);
            background: radial-gradient(circle at 50% 0%, var(--card-accent), transparent 70%);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .card:active { transform: scale(0.98); }

        /* Card selection flash */
        .card.selecting {
            animation: cardSelect 0.5s ease-out;
        }
        @keyframes cardSelect {
            0% { filter: brightness(1); }
            20% { filter: brightness(2.5); box-shadow: 0 0 40px var(--card-accent); }
            40% { filter: brightness(1.2); }
            60% { filter: brightness(2); box-shadow: 0 0 60px var(--card-accent); }
            100% { filter: brightness(1); }
        }

        .card.selected.correct {
            border-color: var(--cyan); background: rgba(0, 255, 213, 0.04);
            box-shadow: 0 0 30px rgba(0, 255, 213, 0.15), inset 0 0 30px rgba(0, 255, 213, 0.02);
        }
        .card.selected.correct::after { opacity: 0.06; }
        .card.selected.correct .card-header { background: rgba(0, 255, 213, 0.1); }
        .card.selected.correct .card-badge { background: var(--cyan); color: var(--bg); }

        .card.selected.wrong {
            border-color: var(--magenta); background: rgba(255, 45, 120, 0.04);
            box-shadow: 0 0 30px rgba(255, 45, 120, 0.15), inset 0 0 30px rgba(255, 45, 120, 0.02);
        }
        .card.selected.wrong::after { opacity: 0.06; --card-accent: var(--magenta); }
        .card.selected.wrong .card-header { background: rgba(255, 45, 120, 0.1); }
        .card.selected.wrong .card-badge { background: var(--magenta); color: var(--bg); }

        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; margin-bottom: 14px;
            background: rgba(255,255,255,0.02); border-radius: 10px;
            transition: all 0.3s ease;
        }
        .card-label {
            font-family: 'Syne Mono', monospace; font-size: 0.7rem;
            letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim);
        }
        .card-badge {
            font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem; font-weight: 600;
            padding: 4px 12px; border-radius: 20px;
            background: rgba(255,255,255,0.06); color: var(--text-dim);
            transition: all 0.3s ease;
        }

        .numbers-grid {
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 3px;
        }
        .num-cell {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-family: 'Syne Mono', monospace; font-size: clamp(0.55rem, 2.2vw, 0.75rem);
            color: var(--text-dim); background: rgba(255,255,255,0.015);
            border-radius: 6px; transition: all 0.2s ease;
        }
        .card.selected.correct .num-cell { color: var(--cyan); background: rgba(0,255,213,0.04); }
        .card.selected.wrong .num-cell { color: var(--magenta); background: rgba(255,45,120,0.04); }

        .card[data-card="6"] { --card-accent: rgba(255,255,255,0.4); }
        .card[data-card="5"] { --card-accent: rgba(139,92,246,0.5); }
        .card[data-card="4"] { --card-accent: rgba(0,255,213,0.5); }
        .card[data-card="3"] { --card-accent: rgba(251,191,36,0.5); }
        .card[data-card="2"] { --card-accent: rgba(255,45,120,0.5); }
        .card[data-card="1"] { --card-accent: rgba(99,102,241,0.5); }

        /* === ANSWER SECTION === */
        .answer-bar {
            background: linear-gradient(145deg, rgba(10,10,16,0.95), rgba(5,5,8,0.98));
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 28px 24px; text-align: center; backdrop-filter: blur(20px);
            position: sticky; bottom: 10px; z-index: 50;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        .answer-title {
            font-family: 'Syne Mono', monospace; font-size: 0.6rem;
            letter-spacing: 4px; text-transform: uppercase; color: var(--text-dim);
            margin-bottom: 18px;
        }
        .answer-row { display: flex; gap: 12px; justify-content: center; align-items: center; flex-wrap: wrap; }
        .answer-input {
            width: 100px; padding: 14px; font-family: 'Outfit', sans-serif;
            font-size: 1.4rem; font-weight: 700; text-align: center;
            background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            color: var(--cyan); outline: none; border-radius: 12px;
            transition: all 0.3s ease; -webkit-appearance: none; -moz-appearance: textfield;
        }
        .answer-input::-webkit-inner-spin-button, .answer-input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .answer-input:focus { border-color: var(--cyan); box-shadow: var(--glow-cyan); }
        .submit-btn {
            padding: 14px 36px; font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(135deg, var(--cyan), var(--violet));
            border: none; color: var(--bg); border-radius: 12px; cursor: pointer;
            transition: all 0.3s ease; touch-action: manipulation;
            box-shadow: 0 0 20px rgba(0,255,213,0.2);
        }
        .submit-btn:active { transform: scale(0.96); }

        /* === MODAL === */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; justify-content: center; align-items: center;
            padding: 20px; backdrop-filter: blur(10px);
        }
        .modal-overlay.open { display: flex; animation: fadeIn 0.3s ease; }
        .modal-box {
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
            padding: 36px 28px; max-width: 420px; width: 100%; text-align: center;
            animation: modalIn 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 0 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        @keyframes modalIn { from { transform: scale(0.9) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-emoji { font-size: 3rem; margin-bottom: 16px; }
        .modal-h {
            font-family: 'Outfit', sans-serif; font-weight: 800;
            font-size: 1.6rem; margin-bottom: 16px; letter-spacing: -0.02em;
        }
        .modal-body { font-size: 0.9rem; color: var(--text-dim); line-height: 1.7; text-align: left; }
        .modal-body strong { color: var(--cyan); font-weight: 600; }
        .modal-close {
            margin-top: 24px; padding: 12px 36px; border-radius: 60px;
            font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; font-weight: 600;
            letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease;
            touch-action: manipulation; text-transform: uppercase;
        }

        .modal-box.success { border-color: rgba(0,255,213,0.2); }
        .modal-box.success .modal-h { color: var(--cyan); }
        .modal-box.success .modal-close { background: var(--cyan); border: none; color: var(--bg); }

        .modal-box.error { border-color: rgba(255,45,120,0.2); }
        .modal-box.error .modal-h { color: var(--magenta); }
        .modal-box.error .modal-body { color: var(--magenta); }
        .modal-box.error .modal-close { background: transparent; border: 1px solid var(--magenta); color: var(--magenta); }

        .password-reveal {
            margin: 20px 0; padding: 20px; border-radius: 12px;
            background: rgba(0, 255, 213, 0.05); border: 1px dashed rgba(0, 255, 213, 0.2);
        }
        .password-reveal .pw-label {
            font-family: 'Syne Mono', monospace; font-size: 0.55rem;
            letter-spacing: 4px; text-transform: uppercase; color: var(--text-dim);
            margin-bottom: 10px;
        }
        .password-reveal .pw-value {
            font-family: 'Syne Mono', monospace; font-size: 1.3rem;
            color: var(--cyan); letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0,255,213,0.5);
        }

        /* === DANGER SHAKE === */
        body.danger { animation: shake 0.6s ease-out; }
        body.danger::before {
            content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
            background: rgba(255, 45, 120, 0.15); animation: dangerFlash 0.12s ease-out 4;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        @keyframes dangerFlash { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        /* === OVERLOAD === */
        body.overload::before {
            content: ''; position: fixed; inset: 0; z-index: 9998; pointer-events: none;
            animation: overloadGlow 2.2s ease-in forwards;
        }
        body.overload::after {
            content: '⚡ OVERLOAD'; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 10000;
            font-family: 'Outfit', sans-serif; font-size: clamp(2rem, 8vw, 5rem); font-weight: 900;
            letter-spacing: -0.02em; white-space: nowrap;
            background: linear-gradient(135deg, var(--cyan), #fff, var(--magenta));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            filter: drop-shadow(0 0 40px var(--cyan)) drop-shadow(0 0 80px var(--violet));
            animation: overloadText 2.2s ease-in forwards;
        }
        @keyframes overloadGlow {
            0% { background: rgba(0,0,0,0.8); }
            50% { background: rgba(0,20,15,0.85); box-shadow: inset 0 0 200px rgba(0,255,213,0.2); }
            100% { background: rgba(0,40,30,0.9); box-shadow: inset 0 0 400px rgba(0,255,213,0.5); }
        }
        @keyframes overloadText {
            0% { opacity: 0; transform: translate(-50%,-50%) scale(0.3); filter: blur(20px) drop-shadow(0 0 10px var(--cyan)); }
            15% { opacity: 1; transform: translate(-50%,-50%) scale(1.05); filter: blur(0) drop-shadow(0 0 40px var(--cyan)); }
            50% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
            85% { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%,-50%) scale(2.5); filter: blur(8px); }
        }
        body.overload-flash::before {
            content: ''; position: fixed; inset: 0; background: white; z-index: 9999;
            pointer-events: none; animation: flashOut 0.5s ease-out forwards;
        }
        @keyframes flashOut { from { opacity: 1; } to { opacity: 0; } }

        /* === RESPONSIVE === */
        @media (min-width: 600px) {
            .cards-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 900px) {
            .cards-grid { grid-template-columns: repeat(3, 1fr); }
            .card:hover { transform: translateY(-4px); border-color: var(--card-accent); box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
            .card:hover::after { opacity: 0.04; }
            .answer-bar { position: relative; bottom: auto; }
        }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; }
        * { scrollbar-width: thin; scrollbar-color: var(--cyan) transparent; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="grain"></div>
    <div class="vignette"></div>
    <div class="scanline"></div>
    <div class="hud-corner tl"></div>
    <div class="hud-corner tr"></div>
    <div class="hud-corner bl"></div>
    <div class="hud-corner br"></div>

    <div class="top-bar">
        <div class="top-bar-left">
            <div class="status-dot"></div>
            <span class="status-label">ENIGMA ACTIVE</span>
        </div>
        <div class="top-bar-right">
            <button class="icon-btn" id="audio-btn" title="Toggle music">🔇</button>
            <button class="icon-btn" id="fs-btn" title="Fullscreen">⛶</button>
        </div>
    </div>

    <div class="main">
        <div class="panel">
            <div class="riddle-label" id="riddle-label">RIDDLE #1</div>
            <div class="panel-frame">
                <div class="page-indicator" id="page-indicator"></div>
                <div class="text-display" id="text-display"></div>
                <div class="progress-track" id="progress-track">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <button class="nav-btn" id="nav-btn">Next →</button>
            </div>
        </div>

        <div class="cards-wrapper" id="cards-wrapper" style="display:none;">
            <div class="cards-grid" id="cards-grid"></div>
            <div class="answer-bar">
                <div class="answer-title">Enter the number</div>
                <div class="answer-row">
                    <input type="number" inputmode="numeric" pattern="[0-9]*" class="answer-input" id="answer-input" placeholder="?" min="1" max="60">
                    <button class="submit-btn" id="submit-btn">Verify</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-box" id="modal-box">
            <div class="modal-emoji" id="modal-emoji"></div>
            <h2 class="modal-h" id="modal-h"></h2>
            <div class="modal-body" id="modal-body"></div>
            <button class="modal-close" id="modal-close">OK</button>
        </div>
    </div>

    <div class="install-prompt" id="install-prompt" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:1002;background:rgba(10,10,16,0.95);border:1px solid var(--border);border-radius:16px;padding:16px 20px;max-width:90%;text-align:center;backdrop-filter:blur(20px);">
        <p style="font-size:0.85rem;color:var(--text-dim);margin-bottom:12px;">📱 Add to Home Screen for a bar-free experience</p>
        <button id="install-btn" style="padding:8px 20px;background:var(--cyan);border:none;border-radius:20px;color:var(--bg);font-family:'Space Grotesk',sans-serif;font-size:0.75rem;font-weight:600;cursor:pointer;margin-right:8px;">Install</button>
        <button id="close-prompt" style="padding:8px 16px;background:transparent;border:1px solid var(--text-dim);border-radius:20px;color:var(--text-dim);font-size:0.75rem;cursor:pointer;">Later</button>
    </div>

    <script>
    // ═══════════════════════════════════════
    // BACKGROUND CANVAS - Particle field
    // ═══════════════════════════════════════
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouse = { x: -1000, y: -1000 };

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class Particle {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.3;
            this.vy = (Math.random() - 0.5) * 0.3;
            this.size = Math.random() * 1.5 + 0.5;
            this.alpha = Math.random() * 0.3 + 0.05;
            this.color = Math.random() > 0.7 ? '0,255,213' : Math.random() > 0.5 ? '139,92,246' : '255,45,120';
        }
        update() {
            const dx = mouse.x - this.x;
            const dy = mouse.y - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 150) {
                const force = (150 - dist) / 150 * 0.02;
                this.vx -= dx * force * 0.01;
                this.vy -= dy * force * 0.01;
            }
            this.x += this.vx;
            this.y += this.vy;
            this.vx *= 0.99;
            this.vy *= 0.99;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${this.color}, ${this.alpha})`;
            ctx.fill();
        }
    }

    for (let i = 0; i < 80; i++) particles.push(new Particle());

    function drawConnections() {
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(0, 255, 213, ${0.06 * (1 - dist / 120)})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }
    }

    function animateBg() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        drawConnections();
        requestAnimationFrame(animateBg);
    }
    animateBg();

    document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    document.addEventListener('touchmove', e => {
        if (e.touches.length > 0) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }
    }, { passive: true });

    // ═══════════════════════════════════════
    // GAME LOGIC
    // ═══════════════════════════════════════
    const PAGES = [
        { text: "WELCOME", isWelcome: true },
        { text: "If you're reading these words, it means you've taken the first step.\n\nThank you for scanning me." },
        { text: "From this very moment, the reality around you changes.\n\nYou're about to enter a role-playing game in the real world." },
        { text: "Throughout the municipality, 10 riddles are hidden.\n\nNine still await you… but only one is in front of you now." },
        { text: "Each riddle is concealed as a QR code, ready to be discovered.\n\nThe puzzles must be solved in ascending order, one after another." },
        { text: "Every time you pass a challenge, you'll receive a secret password.\n\nOnly that key will unlock the next riddle.\n\nThe higher the number, the greater the challenge." },
        { text: "If you have the courage, wit and determination to reach the end…\n\n✨ a surprise awaits you ✨" },
        { text: "So tell me:\n\nAre you ready to start the adventure?", isLastIntro: true },
        { text: "I'm thinking of a secret number, hidden between 1 and 60.\n\nIt's there, invisible… waiting to be discovered.", isGame: true },
        { text: "In front of you, you see several folders.\n\nSelect them, observe carefully — and I will reveal whether the number you seek is hidden there or not.", isGame: true },
        { text: "When you have identified all the correct folders…\n\nStop. Breathe.", isGame: true },
        { text: "It's time to use logic, intuition and your wit.\n\nPut together the clues, connect the fragments of truth and tell me, without hesitation:", isGame: true },
        { text: "What is the number I'm thinking of?", isGame: true, showCards: true, isFinal: true }
    ];

    const SECRET = Math.floor(Math.random() * 60) + 1;
    const PASSWORD = 'ENIGMA2-' + Math.random().toString(36).substring(2, 8).toUpperCase();
    let page = 0;
    let hasWon = false;
    let typing = false;

    function genNumbers(idx) {
        const pw = Math.pow(2, idx), nums = [];
        for (let n = 1; n <= 60; n++) { if ((n & pw) !== 0) nums.push(n); }
        return nums;
    }

    const CARDS = [
        { id: 6, label: 'FOLDER 06', nums: genNumbers(5) },
        { id: 5, label: 'FOLDER 05', nums: genNumbers(4) },
        { id: 4, label: 'FOLDER 04', nums: genNumbers(3) },
        { id: 3, label: 'FOLDER 03', nums: genNumbers(2) },
        { id: 2, label: 'FOLDER 02', nums: genNumbers(1) },
        { id: 1, label: 'FOLDER 01', nums: genNumbers(0) }
    ];

    const $ = id => document.getElementById(id);
    const textDisplay = $('text-display');
    const progressBar = $('progress-bar');
    const progressTrack = $('progress-track');
    const navBtn = $('nav-btn');
    const riddleLabel = $('riddle-label');
    const cardsWrapper = $('cards-wrapper');
    const cardsGrid = $('cards-grid');
    const pageIndicator = $('page-indicator');
    const answerInput = $('answer-input');

    // Build page dots
    PAGES.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'page-dot';
        pageIndicator.appendChild(dot);
    });

    function updateDots() {
        const dots = pageIndicator.querySelectorAll('.page-dot');
        dots.forEach((d, i) => {
            d.className = 'page-dot';
            if (i === page) d.classList.add('active');
            else if (i < page) d.classList.add('done');
        });
    }

    function typeReveal(container, text, isWelcome, isFinal) {
        container.innerHTML = '';
        if (isWelcome) {
            const h = document.createElement('div');
            h.className = 'welcome-title';
            h.textContent = text;
            container.appendChild(h);
            requestAnimationFrame(() => h.classList.add('visible'));
            return;
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'typewriter' + (isFinal ? ' final-q' : '');
        container.appendChild(wrapper);

        const chars = [];
        for (const ch of text) {
            if (ch === '\n') {
                const br = document.createElement('span');
                br.className = 'char break';
                wrapper.appendChild(br);
                chars.push(br);
            } else if (ch === ' ') {
                const sp = document.createElement('span');
                sp.className = 'char space';
                sp.innerHTML = '&nbsp;';
                wrapper.appendChild(sp);
                chars.push(sp);
            } else {
                const span = document.createElement('span');
                span.className = 'char';
                span.textContent = ch;
                wrapper.appendChild(span);
                chars.push(span);
            }
        }

        requestAnimationFrame(() => wrapper.classList.add('visible'));

        typing = true;
        let idx = 0;
        const interval = setInterval(() => {
            if (idx < chars.length) {
                chars[idx].classList.add('revealed');
                idx++;
            } else {
                clearInterval(interval);
                typing = false;
            }
        }, 25);

        // Allow skip
        wrapper._skipFn = () => {
            clearInterval(interval);
            chars.forEach(c => c.classList.add('revealed'));
            typing = false;
        };
    }

    function showPage(idx) {
        const p = PAGES[idx];

        if (idx === 0) {
            $('audio-btn').style.display = 'flex';
        } else {
            $('audio-btn').style.display = 'none';
        }

        if (p.isGame) {
            riddleLabel.classList.add('visible');
        } else {
            riddleLabel.classList.remove('visible');
        }

        typeReveal(textDisplay, p.text, p.isWelcome, p.isFinal);

        if (p.showCards) {
            cardsWrapper.style.display = 'block';
            setTimeout(() => cardsWrapper.classList.add('visible'), 200);
            buildCards();
        } else {
            cardsWrapper.classList.remove('visible');
            cardsWrapper.style.display = 'none';
        }

        if (p.isFinal) {
            navBtn.style.display = 'none';
            progressTrack.style.display = 'none';
        } else if (p.isLastIntro) {
            navBtn.textContent = "Let's go →";
            navBtn.classList.add('start-btn');
            navBtn.style.display = 'inline-block';
            progressTrack.style.display = 'block';
        } else {
            navBtn.textContent = 'Next →';
            navBtn.classList.remove('start-btn');
            navBtn.style.display = 'inline-block';
            progressTrack.style.display = 'block';
        }

        progressBar.style.width = ((idx + 1) / PAGES.length * 100) + '%';
        updateDots();
    }

    function nextPage() {
        // Skip typing if active
        const tw = textDisplay.querySelector('.typewriter');
        if (typing && tw && tw._skipFn) { tw._skipFn(); return; }

        if (page < PAGES.length - 1) {
            page++;
            showPage(page);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function buildCards() {
        cardsGrid.innerHTML = '';
        CARDS.forEach((c, i) => {
            const el = document.createElement('div');
            el.className = 'card';
            el.dataset.card = c.id;
            el.style.animationDelay = (i * 0.08) + 's';
            const has = c.nums.includes(SECRET);
            el.innerHTML = `
                <div class="card-header">
                    <span class="card-label">${c.label}</span>
                    <span class="card-badge">Tap to reveal</span>
                </div>
                <div class="numbers-grid">
                    ${c.nums.map(n => `<div class="num-cell">${n}</div>`).join('')}
                </div>`;
            el.addEventListener('click', () => toggleCard(el, c.id, has));
            cardsGrid.appendChild(el);
        });
    }

    let selected = new Set();
    function toggleCard(el, id, has) {
        const was = el.classList.contains('selected');
        el.classList.add('selecting');
        setTimeout(() => el.classList.remove('selecting'), 500);
        el.classList.remove('selected', 'correct', 'wrong');

        if (!was) {
            setTimeout(() => {
                el.classList.add('selected');
                el.classList.add(has ? 'correct' : 'wrong');
                el.querySelector('.card-badge').textContent = has ? '✓ YES' : '✗ NO';
            }, 250);
            selected.add(id);
        } else {
            el.querySelector('.card-badge').textContent = 'Tap to reveal';
            selected.delete(id);
        }
    }

    function checkAnswer() {
        const val = parseInt(answerInput.value);
        if (isNaN(val) || val < 1 || val > 60) {
            triggerDanger();
            showModal('error', '⚠️', 'ERROR', '<p>Enter a valid number between 1 and 60.</p>');
            return;
        }
        if (val === SECRET) {
            triggerOverload();
        } else {
            triggerDanger();
            showModal('error', '❌', 'WRONG', `
                <p>The number is incorrect.</p>
                <p style="margin-top:12px;">Review your choices among the folders and try again.</p>
                <p style="margin-top:12px;">The number I'm thinking of is present in the folders where I told you it is.</p>
            `);
        }
    }

    function triggerDanger() {
        document.body.classList.add('danger');
        setTimeout(() => document.body.classList.remove('danger'), 700);
    }

    function triggerOverload() {
        document.body.classList.add('overload');
        setTimeout(() => {
            document.body.classList.remove('overload');
            document.body.classList.add('overload-flash');
        }, 2200);
        setTimeout(() => {
            document.body.classList.remove('overload-flash');
            hasWon = true;
            showModal('success', '', 'CORRECT', `
                <p>The number was <strong>${SECRET}</strong>.</p>
                <p style="margin-top:12px;">You passed this challenge with cunning.</p>
                <p style="margin-top:20px;">The trick: the first number in each folder is a power of 2. The secret number appears only in folders whose power-of-2 values sum to the answer.</p>
                <div style="margin:16px 0;padding:12px;background:rgba(255,255,255,0.02);border-radius:10px;font-family:'Syne Mono',monospace;font-size:0.7rem;line-height:2;color:var(--text-dim);">
                    Folder 06 → 32 (2⁵)<br>Folder 05 → 16 (2⁴)<br>Folder 04 → 8 (2³)<br>
                    Folder 03 → 4 (2²)<br>Folder 02 → 2 (2¹)<br>Folder 01 → 1 (2⁰)
                </div>
                <p><em>Example: 37 → 32 + 4 + 1 → Folders 06, 03 & 01</em></p>
                <div class="password-reveal">
                    <div class="pw-label">Password for the next challenge</div>
                    <div class="pw-value">${PASSWORD}</div>
                </div>
                <p>Keep it safe. You'll need it.<br><strong>Good luck… you'll need it.</strong></p>
            `);
        }, 2700);
    }

    function showModal(type, emoji, title, html) {
        $('modal-box').className = 'modal-box ' + type;
        $('modal-emoji').textContent = emoji;
        $('modal-h').textContent = title;
        $('modal-body').innerHTML = html;
        $('modal').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        if (hasWon) {
            document.body.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#050508;color:var(--cyan);font-family:'Outfit',sans-serif;text-align:center;padding:20px;">
                <div style="font-size:3rem;margin-bottom:20px;">✓</div>
                <h1 style="font-size:1.6rem;font-weight:800;color:#00ffd5;margin-bottom:12px;">COMPLETED</h1>
                <p style="font-size:0.9rem;color:#4a5568;">You can close this page.</p>
            </div>`;
            setTimeout(() => window.close(), 1000);
        } else {
            $('modal').classList.remove('open');
            document.body.style.overflow = '';
        }
    }

    // Events
    navBtn.addEventListener('click', nextPage);
    $('submit-btn').addEventListener('click', checkAnswer);
    $('modal-close').addEventListener('click', closeModal);
    $('modal').addEventListener('click', e => { if (e.target === $('modal')) closeModal(); });
    answerInput.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); checkAnswer(); } });

    // Prevent double-tap zoom
    document.addEventListener('touchend', e => {
        const now = Date.now();
        if (now - (document.lastTE || 0) < 300) e.preventDefault();
        document.lastTE = now;
    }, { passive: false });

    // ═══════════════════════════════════════
    // FULLSCREEN
    // ═══════════════════════════════════════
    const fsBtn = $('fs-btn');
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    if (isStandalone) fsBtn.style.display = 'none';

    fsBtn.addEventListener('click', () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            const el = document.documentElement;
            (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
            fsBtn.textContent = '✕';
        } else {
            (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen).call(document);
            fsBtn.textContent = '⛶';
        }
    });
    document.addEventListener('fullscreenchange', () => { fsBtn.textContent = document.fullscreenElement ? '✕' : '⛶'; });

    // ═══════════════════════════════════════
    // PWA
    // ═══════════════════════════════════════
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault(); deferredPrompt = e;
        setTimeout(() => { if (!isStandalone && deferredPrompt) $('install-prompt').style.display = 'block'; }, 4000);
    });
    $('install-btn')?.addEventListener('click', async () => {
        if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if (outcome === 'accepted') $('install-prompt').style.display = 'none'; deferredPrompt = null; }
    });
    $('close-prompt')?.addEventListener('click', () => { $('install-prompt').style.display = 'none'; });
    if (/iPad|iPhone|iPod/.test(navigator.userAgent) && !isStandalone) {
        setTimeout(() => {
            $('install-prompt').querySelector('p').innerHTML = '📱 Tap <strong>Share</strong> → <strong>Add to Home Screen</strong>';
            $('install-btn').style.display = 'none';
            $('install-prompt').style.display = 'block';
        }, 5000);
    }

    // ═══════════════════════════════════════
    // AUDIO ENGINE (same synth, cleaner code)
    // ═══════════════════════════════════════
    const audioBtn = $('audio-btn');
    let playing = false, actx = null, mgain = null, nodes = [], timers = [], beat = 0;

    function startAudio() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        mgain = actx.createGain(); mgain.gain.value = 0.4; mgain.connect(actx.destination);
        const bt = 60 / 110;
        const bass = [55,55,55,55,55,55,55,55,73.42,73.42,73.42,73.42,73.42,73.42,73.42,73.42,65.41,65.41,65.41,65.41,65.41,65.41,65.41,65.41,82.41,82.41,82.41,82.41,82.41,82.41,82.41,82.41];
        const melody = [{n:440,d:.5},{n:0,d:.25},{n:523.25,d:.25},{n:587.33,d:.5},{n:523.25,d:.25},{n:440,d:.25},{n:392,d:.75},{n:0,d:.25},{n:349.23,d:.5},{n:392,d:.25},{n:440,d:.5},{n:0,d:.25},{n:523.25,d:.5},{n:440,d:.5},{n:392,d:.5},{n:329.63,d:.5},{n:440,d:.25},{n:523.25,d:.25},{n:587.33,d:.25},{n:659.25,d:.75},{n:587.33,d:.5},{n:523.25,d:.5},{n:440,d:.5},{n:0,d:.5},{n:392,d:.5},{n:440,d:.5},{n:523.25,d:1},{n:440,d:.5},{n:392,d:.5},{n:329.63,d:1}];
        const arp = [0,4,7,12,7,4,12,7];

        const mk = (type, freq, t, dur, vol, fType, fFreq) => {
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type; o.frequency.value = freq;
            g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
            if (fType) { const f = actx.createBiquadFilter(); f.type = fType; f.frequency.value = fFreq; o.connect(f); f.connect(g); } else { o.connect(g); }
            g.connect(mgain); o.start(t); o.stop(t + dur);
        };
        const noise = (t, dur, hp, vol) => {
            const buf = actx.createBuffer(1, actx.sampleRate * dur, actx.sampleRate), d = buf.getChannelData(0);
            for (let i = 0; i < buf.length; i++) d[i] = Math.random() * 2 - 1;
            const s = actx.createBufferSource(), g = actx.createGain(), f = actx.createBiquadFilter();
            s.buffer = buf; f.type = 'highpass'; f.frequency.value = hp;
            g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
            s.connect(f); f.connect(g); g.connect(mgain); s.start(t);
        };

        // Pad
        const p1 = actx.createOscillator(), p2 = actx.createOscillator(), p3 = actx.createOscillator();
        const pg = actx.createGain(), pf = actx.createBiquadFilter();
        [p1, p2, p3].forEach(o => { o.type = 'sine'; o.connect(pf); });
        p1.frequency.value = 220; p2.frequency.value = 277.18; p3.frequency.value = 329.63;
        pf.type = 'lowpass'; pf.frequency.value = 600; pg.gain.value = 0.05;
        pf.connect(pg); pg.connect(mgain);
        p1.start(); p2.start(); p3.start();
        nodes.push(p1, p2, p3);

        const chords = [[220,277.18,329.63],[293.66,369.99,440],[261.63,329.63,392],[329.63,415.30,493.88]];
        let cc = 0, mi = 0;

        function schedule() {
            const ct = actx.currentTime;
            while (beat < 10000) {
                const t = beat * (bt / 2);
                if (t > ct + 0.2) break;
                if (t >= ct) {
                    const bar = Math.floor(beat / 16), bib = beat % 16, sec = Math.floor(bar / 4) % 4;
                    if (bib % 4 === 0) { const o = actx.createOscillator(), g = actx.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.1); g.gain.setValueAtTime(0.6, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3); o.connect(g); g.connect(mgain); o.start(t); o.stop(t + 0.3); }
                    if (bib === 4 || bib === 12) { noise(t, 0.15, 1000, 0.25); mk('triangle', 200, t, 0.1, 0.25); }
                    noise(t, bib % 4 === 2 ? 0.12 : 0.04, 7000, bib % 4 === 2 ? 0.1 : 0.06);
                    if (bib % 4 === 0) { const f = bass[(bar * 4 + bib / 4) % bass.length]; mk('sawtooth', f, t, bt * 0.85, 0.15, 'lowpass', 400); }
                    if (sec === 1 || sec === 3) { const rf = bass[(bar * 4) % bass.length] * 2, sf = rf * Math.pow(2, arp[bib % 8] / 12); mk('square', sf * 2, t, 0.1, 0.04, 'lowpass', 3000); }
                    if ((sec === 2 || sec === 3) && bib === 0) { let off = 0; for (let i = 0; i < 8; i++) { const m = melody[(mi + i) % melody.length]; if (m.n > 0) mk('sawtooth', m.n, t + off, m.d * bt * 0.9, 0.08, 'lowpass', 1800); off += m.d * bt; } mi = (mi + 8) % melody.length; }
                    if (bib === 0 && bar % 4 === 0) { cc = (cc + 1) % chords.length; const ch = chords[cc]; p1.frequency.setTargetAtTime(ch[0], t, 0.5); p2.frequency.setTargetAtTime(ch[1], t, 0.5); p3.frequency.setTargetAtTime(ch[2], t, 0.5); }
                }
                beat++;
            }
            timers.push(setTimeout(schedule, 100));
        }
        schedule();
    }

    function stopAudio() {
        timers.forEach(clearTimeout); timers = [];
        nodes.forEach(n => { try { n.stop(); } catch (e) {} }); nodes = [];
        if (actx) { actx.close(); actx = null; } beat = 0;
    }

    audioBtn.addEventListener('click', () => {
        if (playing) { stopAudio(); audioBtn.textContent = '🔇'; audioBtn.classList.remove('active'); }
        else { try { startAudio(); audioBtn.textContent = '🔊'; audioBtn.classList.add('active'); } catch (e) {} }
        playing = !playing;
    });

    // ═══════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════
    showPage(0);
    </script>
</body>
</html>
