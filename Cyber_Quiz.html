<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>🎯 Gioco di Logica - Indovinello #1</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --primary: #00ff88;
            --error-red: #ff4444;
            --secondary: #ff00aa;
            --accent: #00aaff;
            --text: #e0e0e0;
            --text-dim: #888;
            --glow-green: 0 0 30px rgba(0, 255, 136, 0.5);
            --glow-red: 0 0 30px rgba(255, 68, 68, 0.5);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            scroll-behavior: smooth;
        }
        
        /* Custom Scrollbar - Cyberpunk style */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(10, 10, 15, 0.8);
            border-left: 1px solid rgba(0, 255, 136, 0.1);
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary), var(--accent));
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.8);
        }
        
        /* Firefox scrollbar */
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--primary) rgba(10, 10, 15, 0.8);
        }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        /* Animated Cyberpunk Background */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background: linear-gradient(180deg, #0a0a0f 0%, #0d0015 50%, #0a0a0f 100%);
        }
        
        /* Neon glow orbs */
        .background-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(0, 255, 136, 0.15) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 0, 170, 0.15) 0%, transparent 40%),
                radial-gradient(ellipse at 60% 60%, rgba(0, 170, 255, 0.1) 0%, transparent 40%),
                radial-gradient(ellipse at 30% 30%, rgba(255, 68, 255, 0.08) 0%, transparent 35%);
            animation: bgFloat 15s ease-in-out infinite;
        }
        
        .background-animation::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 70% 70%, rgba(0, 255, 200, 0.12) 0%, transparent 35%),
                radial-gradient(ellipse at 10% 40%, rgba(255, 0, 100, 0.1) 0%, transparent 40%);
            animation: bgFloat2 20s ease-in-out infinite reverse;
        }
        
        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(3%, 3%) rotate(2deg) scale(1.02); }
            50% { transform: translate(-2%, 2%) rotate(-1deg) scale(0.98); }
            75% { transform: translate(-3%, -2%) rotate(1deg) scale(1.01); }
        }
        
        @keyframes bgFloat2 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-4%, 2%) rotate(-2deg); }
            66% { transform: translate(3%, -3%) rotate(2deg); }
        }
        
        /* Cyberpunk grid floor */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image:
                linear-gradient(rgba(0, 255, 136, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.07) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 8s linear infinite;
            mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.3) 30%, rgba(0,0,0,0.8) 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.3) 30%, rgba(0,0,0,0.8) 100%);
        }
        
        @keyframes gridMove {
            0% { transform: perspective(400px) rotateX(65deg) translateY(0); }
            100% { transform: perspective(400px) rotateX(65deg) translateY(60px); }
        }
        
        /* Horizontal scan lines */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.15) 2px,
                rgba(0, 0, 0, 0.15) 4px
            );
            pointer-events: none;
            animation: scanlineFlicker 0.1s infinite;
        }
        
        @keyframes scanlineFlicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.98; }
        }
        
        /* Moving neon lines */
        .neon-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .neon-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), rgba(0, 255, 136, 0.8), transparent);
            animation: neonMove 4s linear infinite;
            opacity: 0.6;
            filter: blur(1px);
            box-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
        }
        
        .neon-line:nth-child(1) {
            top: 20%;
            width: 30%;
            animation-delay: 0s;
            animation-duration: 5s;
        }
        
        .neon-line:nth-child(2) {
            top: 45%;
            width: 25%;
            background: linear-gradient(90deg, transparent, var(--secondary), rgba(255, 0, 170, 0.8), transparent);
            box-shadow: 0 0 10px var(--secondary), 0 0 20px var(--secondary);
            animation-delay: -2s;
            animation-duration: 6s;
        }
        
        .neon-line:nth-child(3) {
            top: 70%;
            width: 35%;
            background: linear-gradient(90deg, transparent, var(--accent), rgba(0, 170, 255, 0.8), transparent);
            box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
            animation-delay: -1s;
            animation-duration: 4.5s;
        }
        
        .neon-line:nth-child(4) {
            top: 85%;
            width: 20%;
            animation-delay: -3s;
            animation-duration: 7s;
        }
        
        @keyframes neonMove {
            0% { left: -40%; opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { left: 110%; opacity: 0; }
        }
        
        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--primary);
            border-radius: 50%;
            animation: particleFloat 10s linear infinite;
            opacity: 0;
            box-shadow: 0 0 6px var(--primary);
        }
        
        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 25%; animation-delay: -2s; background: var(--secondary); box-shadow: 0 0 6px var(--secondary); }
        .particle:nth-child(3) { left: 40%; animation-delay: -4s; }
        .particle:nth-child(4) { left: 55%; animation-delay: -1s; background: var(--accent); box-shadow: 0 0 6px var(--accent); }
        .particle:nth-child(5) { left: 70%; animation-delay: -3s; }
        .particle:nth-child(6) { left: 85%; animation-delay: -5s; background: var(--secondary); box-shadow: 0 0 6px var(--secondary); }
        .particle:nth-child(7) { left: 15%; animation-delay: -7s; }
        .particle:nth-child(8) { left: 60%; animation-delay: -8s; background: var(--accent); box-shadow: 0 0 6px var(--accent); }
        
        @keyframes particleFloat {
            0% { 
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% { 
                opacity: 0.8;
                transform: translateY(90vh) scale(1);
            }
            90% { 
                opacity: 0.8;
            }
            100% { 
                transform: translateY(-10vh) scale(0.5);
                opacity: 0;
            }
        }
        
        /* Glitch effect overlay */
        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: transparent;
            animation: glitchBg 8s infinite;
        }
        
        @keyframes glitchBg {
            0%, 95%, 100% { 
                background: transparent;
            }
            96% { 
                background: rgba(255, 0, 170, 0.03);
                transform: translateX(2px);
            }
            97% { 
                background: rgba(0, 255, 136, 0.03);
                transform: translateX(-2px);
            }
            98% { 
                background: transparent;
                transform: translateX(0);
            }
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
            position: relative;
        }
        #intro-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            min-height: 80dvh;
            text-align: center;
            padding: 20px;
        }
        .intro-box {
            background: linear-gradient(135deg, rgba(18, 18, 26, 0.95), rgba(10, 10, 15, 0.98));
            border: 2px solid transparent;
            border-image: linear-gradient(135deg, var(--primary), var(--secondary)) 1;
            padding: 40px 30px;
            max-width: 600px;
            width: 100%;
            position: relative;
            overflow: hidden;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .intro-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.1), transparent);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        /* Electric effect for intro-box */
        .intro-box.electric-shock {
            animation: boxElectricShock 0.6s ease-out;
        }
        
        @keyframes boxElectricShock {
            0% {
                filter: brightness(1);
                transform: scale(1);
            }
            10% {
                filter: brightness(1.5) hue-rotate(10deg);
                transform: scale(1.01) translateX(-2px);
                box-shadow: 
                    0 0 30px var(--primary),
                    0 0 60px rgba(0, 255, 136, 0.4),
                    inset 0 0 30px rgba(0, 255, 136, 0.1);
            }
            20% {
                filter: brightness(1.2) hue-rotate(-10deg);
                transform: scale(1.005) translateX(2px);
            }
            30% {
                filter: brightness(2) hue-rotate(5deg);
                transform: scale(1.015) translateX(-1px);
                box-shadow: 
                    0 0 40px var(--accent),
                    0 0 80px var(--primary),
                    inset 0 0 40px rgba(0, 255, 136, 0.2);
            }
            40% {
                filter: brightness(1.1);
                transform: scale(1) translateX(1px);
            }
            50% {
                filter: brightness(2.5) hue-rotate(-5deg);
                transform: scale(1.01);
                box-shadow: 
                    0 0 50px var(--primary),
                    0 0 100px var(--secondary),
                    inset 0 0 50px rgba(0, 255, 136, 0.3);
            }
            60% {
                filter: brightness(1.3);
                transform: scale(1.005);
            }
            80% {
                filter: brightness(1.1);
                transform: scale(1);
            }
            100% {
                filter: brightness(1);
                transform: scale(1);
            }
        }
        
        .intro-box.electric-shock::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, transparent 0%, rgba(0, 255, 136, 0.3) 50%, transparent 100%);
            animation: electricSweepBox 0.25s ease-out 2;
            pointer-events: none;
            z-index: 10;
        }
        
        @keyframes electricSweepBox {
            0% {
                transform: translateX(-100%) skewX(-15deg);
                opacity: 1;
            }
            100% {
                transform: translateX(200%) skewX(-15deg);
                opacity: 0;
            }
        }
        
        /* Cyber text effect */
        .cyber-text {
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            line-height: 1.8;
            color: var(--primary);
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .cyber-text.welcome {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.5));
        }
        
        .cyber-text.visible {
            animation: cyberReveal 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        
        @keyframes cyberReveal {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
                filter: blur(10px);
                text-shadow: 
                    0 0 50px rgba(0, 255, 136, 0.8),
                    0 0 100px rgba(0, 255, 136, 0.4);
            }
            30% {
                opacity: 1;
                filter: blur(0);
            }
            50% {
                text-shadow: 
                    -2px 0 var(--secondary),
                    2px 0 var(--accent),
                    0 0 20px rgba(0, 255, 136, 0.8);
            }
            70% {
                transform: translateY(0) scale(1.02);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            }
        }
        
        /* Glitch effect on text */
        .cyber-text.glitch {
            animation: cyberReveal 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards,
                       textGlitch 3s infinite 1s;
        }
        
        @keyframes textGlitch {
            0%, 92%, 100% {
                text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            }
            93% {
                text-shadow: -3px 0 var(--secondary), 3px 0 var(--accent);
                transform: translateX(-2px);
            }
            94% {
                text-shadow: 3px 0 var(--secondary), -3px 0 var(--accent);
                transform: translateX(2px);
            }
            95% {
                text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
                transform: translateX(0);
            }
        }
        
        /* Progress bar */
        .progress-container {
            width: 100%;
            max-width: 300px;
            margin-top: 30px;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.2), transparent);
            animation: progressShine 2s linear infinite;
        }
        
        @keyframes progressShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary));
            border-radius: 2px;
            transition: width 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            box-shadow: 0 0 10px var(--primary), 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
            animation: progressPulse 1s ease-in-out infinite;
        }
        
        @keyframes progressPulse {
            0%, 100% { 
                box-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
                transform: translateY(-50%) scale(1);
            }
            50% { 
                box-shadow: 0 0 15px var(--primary), 0 0 30px var(--primary), 0 0 40px var(--accent);
                transform: translateY(-50%) scale(1.3);
            }
        }
        
        .nav-btn {
            margin-top: 35px;
            padding: 16px 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
            border-radius: 4px;
        }
        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--primary);
            transition: left 0.3s ease;
            z-index: -1;
        }
        .nav-btn:hover, .nav-btn:active {
            color: var(--bg-dark);
        }
        .nav-btn:hover::before, .nav-btn:active::before {
            left: 0;
        }
        
        .nav-btn.start-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: var(--bg-dark);
            padding: 18px 60px;
            font-size: 1.1rem;
            animation: pulse 2s infinite;
        }
        
        .nav-btn.start-btn::before {
            display: none;
        }
        
        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            }
            50% {
                box-shadow: 0 0 40px rgba(0, 255, 136, 0.8), 0 0 60px rgba(0, 255, 136, 0.4);
            }
        }
        
        /* Final question style */
        .cyber-text.final-question {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.3rem, 5vw, 2rem);
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 170, 255, 0.6);
        }
        
        /* Game title */
        .game-title {
            display: none;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 900;
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            border-bottom: 1px solid rgba(0, 255, 136, 0.3);
            text-shadow: none;
            filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.4));
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.5s ease;
        }
        
        .game-title.visible {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Cards wrapper */
        .cards-wrapper {
            width: 100%;
            max-width: 1000px;
            margin-top: 30px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .cards-wrapper.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .cards-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .card {
            background: var(--bg-card);
            border: 2px solid rgba(100, 100, 120, 0.3);
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--card-color, #666), transparent);
            opacity: 0.5;
        }
        .card:active {
            transform: scale(0.98);
        }

        /* Electric/Cyber selection effect */
        .card.selecting {
            animation: electricShock 0.6s ease-out;
        }
        
        @keyframes electricShock {
            0% {
                filter: brightness(1);
                transform: scale(1);
            }
            10% {
                filter: brightness(2) hue-rotate(20deg);
                transform: scale(1.02) translateX(-2px);
                box-shadow: 
                    0 0 20px var(--primary),
                    0 0 40px var(--primary),
                    inset 0 0 20px rgba(0, 255, 136, 0.3);
            }
            20% {
                filter: brightness(1.5) hue-rotate(-20deg);
                transform: scale(1.01) translateX(2px);
            }
            30% {
                filter: brightness(2.5) hue-rotate(10deg);
                transform: scale(1.03) translateX(-1px);
                box-shadow: 
                    0 0 30px var(--accent),
                    0 0 60px var(--primary),
                    inset 0 0 30px rgba(0, 255, 136, 0.4);
            }
            40% {
                filter: brightness(1.2);
                transform: scale(1) translateX(1px);
            }
            50% {
                filter: brightness(3) hue-rotate(-10deg);
                transform: scale(1.02);
                box-shadow: 
                    0 0 40px var(--primary),
                    0 0 80px var(--secondary),
                    inset 0 0 40px rgba(0, 255, 136, 0.5);
            }
            60% {
                filter: brightness(1.5);
                transform: scale(1.01);
            }
            80% {
                filter: brightness(1.2);
                transform: scale(1);
            }
            100% {
                filter: brightness(1);
                transform: scale(1);
            }
        }
        
        /* Electric sparks overlay */
        .card.selecting::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, transparent 0%, rgba(0, 255, 136, 0.4) 50%, transparent 100%);
            animation: electricSweep 0.3s ease-out 2;
            pointer-events: none;
        }
        
        @keyframes electricSweep {
            0% {
                transform: translateX(-100%) skewX(-20deg);
                opacity: 1;
            }
            100% {
                transform: translateX(200%) skewX(-20deg);
                opacity: 0;
            }

        /* Glitch effect on card content during selection */
        .card.selecting .card-title {
            animation: textGlitchFast 0.1s steps(2) 6;
        }
        
        .card.selecting .number-cell {
            animation: cellFlicker 0.08s steps(2) 8;
        }
        
        @keyframes textGlitchFast {
            0%, 100% {
                text-shadow: none;
                transform: translateX(0);
            }
            25% {
                text-shadow: -2px 0 var(--secondary), 2px 0 var(--accent);
                transform: translateX(-1px);
            }
            75% {
                text-shadow: 2px 0 var(--secondary), -2px 0 var(--accent);
                transform: translateX(1px);
            }
        }
        
        @keyframes cellFlicker {
            0%, 100% {
                opacity: 1;
                background: rgba(255, 255, 255, 0.03);
            }
            50% {
                opacity: 0.5;
                background: rgba(0, 255, 136, 0.3);
            }

        /* Cartella selezionata CORRETTA (verde) */

            color: var(--primary);
        }
        .card.selected.correct .number-cell {
            background: rgba(0, 255, 136, 0.1);
        }

        /* Cartella selezionata SBAGLIATA (rosso) */
        .card.selected.wrong {

            background: rgba(255, 68, 68, 0.08);
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.3);
        }
        .card.selected.wrong .card-header {
            background: var(--error-red);
            color: var(--bg-dark);
        }
        .card.selected.wrong .card-status {
            background: var(--bg-dark);
            color: var(--error-red);
        }
        .card.selected.wrong .number-cell {
            background: rgba(255, 68, 68, 0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);

        .card-title {
            font-family: 'Orbitron', sans-serif;

        .card-status {
            font-size: 0.85rem;

        .numbers-grid {

        .number-cell {

        /* Card Colors - invertiti per ordine decrescente */
        .card[data-card="6"] { --card-color: #ffffff; --card-glow: 0 0 20px rgba(255, 255, 255, 0.3); }
        .card[data-card="5"] { --card-color: #ff44ff; --card-glow: 0 0 20px rgba(255, 68, 255, 0.3); }
        .card[data-card="4"] { --card-color: #00aaff; --card-glow: 0 0 20px rgba(0, 170, 255, 0.3); }
        .card[data-card="3"] { --card-color: #44ff44; --card-glow: 0 0 20px rgba(68, 255, 68, 0.3); }
        .card[data-card="2"] { --card-color: #ffaa00; --card-glow: 0 0 20px rgba(255, 170, 0, 0.3); }
        .card[data-card="1"] { --card-color: #ff4444; --card-glow: 0 0 20px rgba(255, 68, 68, 0.3); }

        .answer-section {
            background: var(--bg-card);

        .submit-btn {

        .submit-btn:active {

        /* Modale ottimizzata per mobile */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);

            align-items: center;
            padding: 15px;
            animation: fadeIn 0.3s ease;
            overflow-y: auto;
        }
        .modal-content {
            background: var(--bg-card);
            border: 2px solid var(--primary);
            padding: 30px 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh;
            max-height: 90dvh;
            overflow-y: auto;
            border-radius: 12px;
        }
        .modal-icon {
            font-size: 3.5rem;
            margin-bottom: 12px;
        }
        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }
        .modal-text {
            font-size: 1rem;
            color: var(--text-dim);
            line-height: 1.6;
            text-align: left;
        }
        .modal-btn {
            margin-top: 20px;
            padding: 12px 35px;
            font-size: 1rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            cursor: pointer;
            border-radius: 8px;
            touch-action: manipulation;
        }
        .modal-btn:active {
            background: var(--primary);
            color: var(--bg-dark);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content.success {
            border-color: var(--primary);
        }
        .modal-content.success .modal-icon {
            color: var(--primary);
            text-shadow: var(--glow-green);
        }
        .modal-content.success .modal-title {
            color: var(--primary);
        }
        .modal-content.error {
            border-color: #ff4444;
        }
        .modal-content.error .modal-icon {
            color: #ff4444;
        }
        .modal-content.error .modal-title {
            color: #ff4444;
        }
        .modal-content.error .modal-text {
            color: #ff4444;
        }
        .modal-content.error .modal-text p {
            color: #ff4444;
        }
        .modal-content.error .modal-btn {
            border-color: #ff4444;
            color: #ff4444;
        }
        .modal-content.error .modal-btn:active {
            background: #ff4444;
            color: var(--bg-dark);
        }
        
        /* Danger shock effect - wrong answer */
        body.danger-shock {
            animation: dangerShock 0.8s ease-out;
        }
        
        body.danger-shock::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.3);
            z-index: 9999;
            pointer-events: none;
            animation: dangerFlash 0.15s ease-out 5;
        }
        
        @keyframes dangerShock {
            0%, 100% {
                transform: translateX(0);
                filter: none;
            }
            10% {
                transform: translateX(-10px) skewX(-1deg);
                filter: hue-rotate(-50deg) brightness(1.2) saturate(2);
            }
            20% {
                transform: translateX(10px) skewX(1deg);
                filter: hue-rotate(-40deg) saturate(2.5);
            }
            30% {
                transform: translateX(-8px) skewX(-0.5deg);
                filter: brightness(1.5) saturate(2) hue-rotate(-60deg);
            }
            40% {
                transform: translateX(8px) skewX(0.5deg);
                filter: hue-rotate(-50deg) saturate(2);
            }
            50% {
                transform: translateX(-5px);
                filter: hue-rotate(-45deg) brightness(1.3) saturate(2.5);
            }
            60% {
                transform: translateX(5px);
                filter: hue-rotate(-55deg) saturate(2);
            }
            70% {
                transform: translateX(-3px);
                filter: brightness(1.1) hue-rotate(-50deg);
            }
            80% {
                transform: translateX(3px);
                filter: hue-rotate(-40deg);
            }
            90% {
                transform: translateX(-1px);
                filter: hue-rotate(-30deg);
            }
        }
        
        @keyframes dangerFlash {
            0%, 100% {
                opacity: 0.2;
                background: rgba(255, 0, 0, 0.2);
            }
            50% {
                opacity: 1;
                background: rgba(255, 0, 0, 0.5);
            }
        }
        
        /* Overload effect - correct answer */
        body.overload {
            animation: overloadBuild 2s ease-in forwards;
        }
        
        body.overload::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9998;
            pointer-events: none;
            animation: overloadGlow 2s ease-in forwards;
        }
        
        body.overload::after {
            content: '⚡ SOVRACCARICO ⚡';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 6vw, 4rem);
            font-weight: 900;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px var(--primary)) drop-shadow(0 0 60px var(--accent));
            z-index: 10000;
            animation: overloadText 2s ease-in forwards;
            letter-spacing: 5px;
            white-space: nowrap;
            padding: 20px 40px;
        }
        
        @keyframes overloadBuild {
            0% {
                filter: brightness(1) saturate(1);
            }
            30% {
                filter: brightness(1.1) saturate(1.2);
            }
            50% {
                filter: brightness(1.3) saturate(1.5) hue-rotate(10deg);
            }
            70% {
                filter: brightness(1.5) saturate(2) hue-rotate(-10deg);
            }
            85% {
                filter: brightness(2) saturate(2.5) hue-rotate(20deg);
            }
            100% {
                filter: brightness(3) saturate(3) hue-rotate(-20deg);
            }
        }
        
        @keyframes overloadGlow {
            0% {
                background: rgba(0, 0, 0, 0.7);
                box-shadow: none;
            }
            30% {
                background: rgba(0, 20, 10, 0.8);
                box-shadow: inset 0 0 100px rgba(0, 255, 136, 0.2);
            }
            50% {
                background: rgba(0, 30, 20, 0.85);
                box-shadow: inset 0 0 150px rgba(0, 255, 136, 0.3);
            }
            70% {
                background: rgba(0, 40, 30, 0.9);
                box-shadow: inset 0 0 200px rgba(0, 255, 136, 0.4);
            }
            90% {
                background: rgba(0, 50, 40, 0.9);
                box-shadow: inset 0 0 300px rgba(0, 255, 136, 0.6);
            }
            100% {
                background: rgba(0, 60, 50, 0.95);
                box-shadow: inset 0 0 400px rgba(0, 255, 136, 0.8);
            }
        }
        
        @keyframes overloadText {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3);
                filter: drop-shadow(0 0 10px var(--primary)) blur(10px);
            }
            15% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
                filter: drop-shadow(0 0 30px var(--primary)) drop-shadow(0 0 60px var(--accent)) blur(0);
            }
            25% {
                transform: translate(-50%, -50%) scale(1);
            }
            35%, 45% {
                transform: translate(-52%, -50%) scale(1.02);
                filter: drop-shadow(0 0 40px var(--primary)) drop-shadow(0 0 80px var(--secondary));
            }
            40%, 50% {
                transform: translate(-48%, -50%) scale(0.98);
            }
            55%, 65% {
                transform: translate(-50%, -50%) scale(1.05);
                filter: drop-shadow(0 0 50px var(--primary)) drop-shadow(0 0 100px var(--accent));
            }
            70% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            85% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.3);
                filter: drop-shadow(0 0 60px var(--primary)) drop-shadow(0 0 120px var(--accent));
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2.5);
                filter: drop-shadow(0 0 100px var(--primary)) blur(5px);
            }
        }
        
        /* Overload flash finale */
        body.overload-flash {
            animation: overloadFlash 0.5s ease-out forwards;
        }
        
        body.overload-flash::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            pointer-events: none;
            animation: flashOut 0.5s ease-out forwards;
        }
        
        @keyframes overloadFlash {
            0% {
                filter: brightness(5);
            }
            100% {
                filter: brightness(1);
            }
        }
        
        @keyframes flashOut {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }
        
        /* Audio toggle button */
        .audio-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid var(--primary);
            border-radius: 25px;
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            touch-action: manipulation;
        }
        
        .audio-toggle:hover, .audio-toggle:active {
            background: var(--primary);
            color: var(--bg-dark);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        .audio-toggle.playing {
            border-color: var(--accent);
            animation: audioPulse 1s ease-in-out infinite;
        }
        
        .audio-toggle.playing .audio-icon {
            animation: audioWave 0.5s ease-in-out infinite;
        }
        
        @keyframes audioPulse {
            0%, 100% {
                box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            }
            50% {
                box-shadow: 0 0 20px rgba(0, 255, 136, 0.6), 0 0 30px rgba(0, 170, 255, 0.3);
            }
        }
        
        @keyframes audioWave {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }
        
        .audio-icon {
            font-size: 1rem;
        }
        
        /* Language selector */
        .language-selector {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 10px;
            background: rgba(10, 10, 15, 0.9);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        
        .lang-btn {
            padding: 8px 15px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: var(--text-dim);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            touch-action: manipulation;
        }
        
        .lang-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .lang-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--bg-dark);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        /* Electric cursor trail effect */
        .electric-spark {
            position: fixed;
            pointer-events: none;
            z-index: 9000;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 
                0 0 10px var(--primary),
                0 0 20px var(--primary),
                0 0 30px var(--accent);
            animation: sparkFade 0.6s ease-out forwards;
        }
        
        .electric-spark::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: sparkLine 0.3s ease-out forwards;
        }
        
        .electric-spark::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            width: 20px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: sparkLine 0.3s ease-out forwards;
        }
        
        .electric-spark.alt::before {
            transform: translate(-50%, -50%) rotate(45deg);
            background: linear-gradient(90deg, transparent, var(--secondary), transparent);
        }
        
        .electric-spark.alt::after {
            transform: translate(-50%, -50%) rotate(-45deg);
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }
        
        @keyframes sparkFade {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.2);
            }
        }
        
        @keyframes sparkLine {
            0% {
                width: 30px;
                opacity: 1;
            }
            100% {
                width: 5px;
                opacity: 0;
            }
        }
        
        /* Lightning bolt trail */
        .lightning-bolt {
            position: fixed;
            pointer-events: none;
            z-index: 8999;
            font-size: 16px;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--accent);
            animation: boltFade 0.4s ease-out forwards;
        }
        
        @keyframes boltFade {
            0% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: scale(0.5) rotate(20deg);
            }
        }

        /* Password highlight */
        .password-box {
            background: rgba(0, 255, 136, 0.1);
            border: 2px dashed var(--primary);
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            text-align: center;
        }
        .password-box strong {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: var(--primary);
            letter-spacing: 3px;
        }

        /* Media queries per schermi più grandi */
        @media (min-width: 600px) {
            .cards-container {
                grid-template-columns: repeat(2, 1fr);
            }
            .numbers-grid {
                gap: 5px;
            }
        }

        @media (min-width: 900px) {
            .cards-container {
                grid-template-columns: repeat(3, 1fr);
            }
            .card:hover {
                transform: translateY(-5px) scale(1.02);
                border-color: var(--card-color, #666);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3), var(--card-glow, none);
            }
            .answer-section {
                position: relative;
            }
        }
    </style>
</head>

        function createCards() {
            const t = TRANSLATIONS[currentLang];
            cardsContainer.innerHTML = '';
            CARDS_DATA.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';

                cardElement.addEventListener('click', () => toggleCard(cardElement, card.id, hasNumber));
                cardsContainer.appendChild(cardElement);
            });
        }

        function toggleCard(element, cardId, hasNumber) {
            const t = TRANSLATIONS[currentLang];
            const wasSelected = element.classList.contains('selected');
            
            // Add electric effect
            element.classList.add('selecting');
            setTimeout(() => {
                element.classList.remove('selecting');
            }, 600);
            
            element.classList.remove('selected', 'correct', 'wrong');

            if (!wasSelected) {
                setTimeout(() => {
                    element.classList.add('selected');
                    if (hasNumber) {
                        element.classList.add('correct');
                        element.querySelector('.card-status').textContent = t.cardYes;
                    } else {
                        element.classList.add('wrong');
                        element.querySelector('.card-status').textContent = t.cardNo;
                    }
                }, 300);
                selectedCards.add(cardId);
            } else {
                element.querySelector('.card-status').textContent = t.cardStatus;
                selectedCards.delete(cardId);
            }

        // Cyberpunk Song Generator - Vera canzone con melodia, beat e struttura
        const audioToggle = document.getElementById('audio-toggle');

        let isPlaying = false;
        let audioContext = null;

        function createCyberpunkSong() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioContext.createGain();
            masterGain.gain.value = 0.5;
            masterGain.connect(audioContext.destination);
            
            const beatTime = 60 / bpm;
            
            // Melodie e progressioni
            const bassPattern = [
                55, 55, 55, 55, 55, 55, 55, 55,      // A
                73.42, 73.42, 73.42, 73.42, 73.42, 73.42, 73.42, 73.42,  // D
                65.41, 65.41, 65.41, 65.41, 65.41, 65.41, 65.41, 65.41,  // C
                82.41, 82.41, 82.41, 82.41, 82.41, 82.41, 82.41, 82.41   // E
            ];
            
            const melodyPattern = [
                // Frase 1

                { note: 0, duration: 0.25 },
                { note: 523.25, duration: 0.25 },
                { note: 587.33, duration: 0.5 },
                { note: 523.25, duration: 0.25 },
                { note: 440, duration: 0.25 },
                { note: 392, duration: 0.75 },
                { note: 0, duration: 0.25 },
                // Frase 2
                { note: 349.23, duration: 0.5 },
                { note: 392, duration: 0.25 },
                { note: 440, duration: 0.5 },
                { note: 0, duration: 0.25 },
                { note: 523.25, duration: 0.5 },
                { note: 440, duration: 0.5 },
                { note: 392, duration: 0.5 },
                { note: 329.63, duration: 0.5 },
                // Frase 3
                { note: 440, duration: 0.25 },
                { note: 523.25, duration: 0.25 },
                { note: 587.33, duration: 0.25 },
                { note: 659.25, duration: 0.75 },
                { note: 587.33, duration: 0.5 },
                { note: 523.25, duration: 0.5 },
                { note: 440, duration: 0.5 },
                { note: 0, duration: 0.5 },
                // Frase 4
                { note: 392, duration: 0.5 },
                { note: 440, duration: 0.5 },
                { note: 523.25, duration: 1 },
                { note: 440, duration: 0.5 },
                { note: 392, duration: 0.5 },
                { note: 329.63, duration: 1 }
            ];
            
            const arpPattern = [0, 4, 7, 12, 7, 4, 12, 7]; // Semitoni relativi alla root
            
            // === KICK DRUM ===
            function playKick(time) {
                const kick = audioContext.createOscillator();
                const kickGain = audioContext.createGain();
                const kickFilter = audioContext.createBiquadFilter();
                
                kick.type = 'sine';
                kick.frequency.setValueAtTime(150, time);
                kick.frequency.exponentialRampToValueAtTime(40, time + 0.1);
                
                kickFilter.type = 'lowpass';
                kickFilter.frequency.value = 200;
                
                kickGain.gain.setValueAtTime(0.7, time);
                kickGain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
                
                kick.connect(kickFilter);
                kickFilter.connect(kickGain);
                kickGain.connect(masterGain);
                
                kick.start(time);
                kick.stop(time + 0.3);
            }
            
            // === SNARE ===
            function playSnare(time) {
                // Noise part
                const noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.2, audioContext.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseBuffer.length; i++) {
                    noiseData[i] = Math.random() * 2 - 1;
                }
                
                const noise = audioContext.createBufferSource();
                noise.buffer = noiseBuffer;
                
                const noiseGain = audioContext.createGain();
                const noiseFilter = audioContext.createBiquadFilter();
                
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                
                noiseGain.gain.setValueAtTime(0.3, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
                
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(masterGain);
                
                noise.start(time);
                
                // Body
                const body = audioContext.createOscillator();
                const bodyGain = audioContext.createGain();
                body.type = 'triangle';
                body.frequency.setValueAtTime(200, time);
                body.frequency.exponentialRampToValueAtTime(80, time + 0.05);
                bodyGain.gain.setValueAtTime(0.3, time);
                bodyGain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                body.connect(bodyGain);
                bodyGain.connect(masterGain);
                body.start(time);
                body.stop(time + 0.15);
            }
            
            // === HI-HAT ===
            function playHihat(time, open = false) {
                const duration = open ? 0.15 : 0.05;
                const noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * duration, audioContext.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseBuffer.length; i++) {
                    noiseData[i] = Math.random() * 2 - 1;
                }
                
                const noise = audioContext.createBufferSource();
                noise.buffer = noiseBuffer;
                
                const noiseGain = audioContext.createGain();
                const noiseFilter = audioContext.createBiquadFilter();
                
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 7000;
                
                noiseGain.gain.setValueAtTime(open ? 0.12 : 0.08, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, time + duration);
                
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(masterGain);
                
                noise.start(time);
            }
            
            // === BASS SYNTH ===
            function playBass(time, freq, duration) {
                const bass1 = audioContext.createOscillator();
                const bass2 = audioContext.createOscillator();
                const bassGain = audioContext.createGain();
                const bassFilter = audioContext.createBiquadFilter();
                
                bass1.type = 'sawtooth';
                bass2.type = 'square';
                bass1.frequency.value = freq;
                bass2.frequency.value = freq * 1.005; // Slight detune
                
                bassFilter.type = 'lowpass';
                bassFilter.frequency.setValueAtTime(300, time);
                bassFilter.frequency.linearRampToValueAtTime(800, time + 0.05);
                bassFilter.frequency.linearRampToValueAtTime(400, time + duration);
                bassFilter.Q.value = 3;
                
                bassGain.gain.setValueAtTime(0.2, time);
                bassGain.gain.setValueAtTime(0.2, time + duration - 0.05);
                bassGain.gain.linearRampToValueAtTime(0, time + duration);
                
                bass1.connect(bassFilter);
                bass2.connect(bassFilter);
                bassFilter.connect(bassGain);
                bassGain.connect(masterGain);
                
                bass1.start(time);
                bass2.start(time);
                bass1.stop(time + duration);
                bass2.stop(time + duration);
            }
            
            // === LEAD SYNTH ===
            function playLead(time, freq, duration) {
                if (freq === 0) return;
                
                const lead1 = audioContext.createOscillator();
                const lead2 = audioContext.createOscillator();
                const leadGain = audioContext.createGain();
                const leadFilter = audioContext.createBiquadFilter();
                const delay = audioContext.createDelay();
                const delayGain = audioContext.createGain();
                
                lead1.type = 'sawtooth';
                lead2.type = 'square';
                lead1.frequency.value = freq;
                lead2.frequency.value = freq * 2.01; // Octave up + detune
                
                leadFilter.type = 'lowpass';
                leadFilter.frequency.setValueAtTime(2000, time);
                leadFilter.frequency.linearRampToValueAtTime(1200, time + duration);
                leadFilter.Q.value = 2;
                
                leadGain.gain.setValueAtTime(0, time);
                leadGain.gain.linearRampToValueAtTime(0.12, time + 0.02);
                leadGain.gain.setValueAtTime(0.1, time + duration - 0.05);
                leadGain.gain.linearRampToValueAtTime(0, time + duration);
                
                delay.delayTime.value = beatTime * 0.375;
                delayGain.gain.value = 0.3;
                
                lead1.connect(leadFilter);
                lead2.connect(leadFilter);
                leadFilter.connect(leadGain);
                leadGain.connect(masterGain);
                leadGain.connect(delay);
                delay.connect(delayGain);
                delayGain.connect(masterGain);
                
                lead1.start(time);
                lead2.start(time);
                lead1.stop(time + duration + 0.5);
                lead2.stop(time + duration + 0.5);
            }
            
            // === ARP SYNTH ===
            function playArp(time, rootFreq, semitones) {
                const freq = rootFreq * Math.pow(2, semitones / 12);
                
                const arp = audioContext.createOscillator();
                const arpGain = audioContext.createGain();
                const arpFilter = audioContext.createBiquadFilter();
                
                arp.type = 'square';
                arp.frequency.value = freq * 2;
                
                arpFilter.type = 'lowpass';
                arpFilter.frequency.value = 3000;
                arpFilter.Q.value = 5;
                
                arpGain.gain.setValueAtTime(0.06, time);
                arpGain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                
                arp.connect(arpFilter);
                arpFilter.connect(arpGain);
                arpGain.connect(masterGain);
                
                arp.start(time);
                arp.stop(time + 0.15);
            }
            
            // === PAD ===
            const padOsc1 = audioContext.createOscillator();
            const padOsc2 = audioContext.createOscillator();
            const padOsc3 = audioContext.createOscillator();
            const padGain = audioContext.createGain();
            const padFilter = audioContext.createBiquadFilter();
            
            padOsc1.type = 'sine';
            padOsc2.type = 'sine';
            padOsc3.type = 'sine';
            padOsc1.frequency.value = 220;
            padOsc2.frequency.value = 277.18;
            padOsc3.frequency.value = 329.63;
            
            padFilter.type = 'lowpass';
            padFilter.frequency.value = 800;
            
            padGain.gain.value = 0.06;
            
            padOsc1.connect(padFilter);
            padOsc2.connect(padFilter);
            padOsc3.connect(padFilter);
            padFilter.connect(padGain);
            padGain.connect(masterGain);
            
            padOsc1.start();
            padOsc2.start();
            padOsc3.start();
            activeNodes.push(padOsc1, padOsc2, padOsc3);
            
            // Chord changes per il pad
            const chords = [
                [220, 277.18, 329.63],     // Am
                [293.66, 369.99, 440],     // D
                [261.63, 329.63, 392],     // C
                [329.63, 415.30, 493.88]   // E
            ];
            let currentChord = 0;
            
            // === MAIN SEQUENCER ===
            let melodyIndex = 0;
            let melodyTime = 0;
            
            function scheduleNotes() {
                const currentTime = audioContext.currentTime;
                const scheduleAhead = 0.2;
                
                while (currentBeat < 10000) {
                    const beatStartTime = currentBeat * (beatTime / 2);
                    
                    if (beatStartTime > currentTime + scheduleAhead) break;
                    
                    if (beatStartTime >= currentTime) {
                        const bar = Math.floor(currentBeat / 16);
                        const beatInBar = currentBeat % 16;
                        const section = Math.floor(bar / 4) % 4;
                        
                        // Kick: 4 on the floor (ogni 4 mezzi-beat = ogni beat)
                        if (beatInBar % 4 === 0) {
                            playKick(beatStartTime);
                        }
                        
                        // Snare: beat 2 e 4
                        if (beatInBar === 4 || beatInBar === 12) {
                            playSnare(beatStartTime);
                        }
                        
                        // Hi-hat: ogni mezzo beat
                        playHihat(beatStartTime, beatInBar % 4 === 2);
                        
                        // Bass: ogni beat
                        if (beatInBar % 4 === 0) {
                            const bassNote = bassPattern[(bar * 4 + beatInBar / 4) % bassPattern.length];
                            playBass(beatStartTime, bassNote, beatTime * 0.9);
                        }
                        
                        // Arpeggio: ogni mezzo beat durante la sezione 1 e 3
                        if (section === 1 || section === 3) {
                            const rootFreq = bassPattern[(bar * 4) % bassPattern.length] * 2;
                            const arpNote = arpPattern[beatInBar % arpPattern.length];
                            playArp(beatStartTime, rootFreq, arpNote);
                        }
                        
                        // Melodia: durante sezione 2 e 3
                        if ((section === 2 || section === 3) && beatInBar === 0) {
                            let timeOffset = 0;
                            for (let i = 0; i < 8 && melodyIndex + i < melodyPattern.length; i++) {
                                const m = melodyPattern[(melodyIndex + i) % melodyPattern.length];
                                playLead(beatStartTime + timeOffset, m.note, m.duration * beatTime);
                                timeOffset += m.duration * beatTime;
                            }
                            melodyIndex = (melodyIndex + 8) % melodyPattern.length;
                        }
                        
                        // Cambio accordi pad ogni 4 bar
                        if (beatInBar === 0 && bar % 4 === 0) {
                            currentChord = (currentChord + 1) % chords.length;
                            const chord = chords[currentChord];
                            padOsc1.frequency.setTargetAtTime(chord[0], beatStartTime, 0.5);
                            padOsc2.frequency.setTargetAtTime(chord[1], beatStartTime, 0.5);
                            padOsc3.frequency.setTargetAtTime(chord[2], beatStartTime, 0.5);
                        }
                    }
                    
                    currentBeat++;
                }
                
                const scheduleInterval = setTimeout(scheduleNotes, 100);
                scheduledEvents.push(scheduleInterval);
            }
            
            scheduleNotes();
        }
        
        function stopCyberpunkSong() {
            scheduledEvents.forEach(id => {
                clearTimeout(id);
                clearInterval(id);
            });
            scheduledEvents = [];
            
            activeNodes.forEach(node => {
                try { node.stop(); } catch(e) {}
            });
            activeNodes = [];
            
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            
            currentBeat = 0;
        }
        
        audioToggle.addEventListener('click', async () => {
            if (isPlaying) {
                stopCyberpunkSong();
                audioIcon.textContent = '🔇';
                audioToggle.classList.remove('playing');
                isPlaying = false;
            } else {
                try {
                    createCyberpunkSong();
                    audioIcon.textContent = '🔊';
                    audioToggle.classList.add('playing');
                    isPlaying = true;
                } catch (err) {
                    console.log('Errore audio:', err);
                }
            }
        });
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkAnswer();
            }
        });
        modal.addEventListener('click', (e) => {
            if (e.target === modal) hideModal();
        });

        // Prevent zoom on double tap
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - (document.lastTouchEnd || 0) < 300) {
                e.preventDefault();
            }
            document.lastTouchEnd = now;
        }, { passive: false });

        // Electric cursor trail effect
        let lastSparkTime = 0;
        let sparkCounter = 0;
        
        function createElectricSpark(x, y) {
            // Main spark
            const spark = document.createElement('div');
            spark.className = 'electric-spark' + (Math.random() > 0.5 ? ' alt' : '');
            spark.style.left = (x + (Math.random() - 0.5) * 20) + 'px';
            spark.style.top = (y + (Math.random() - 0.5) * 20) + 'px';
            document.body.appendChild(spark);
            
            // Remove after animation
            setTimeout(() => spark.remove(), 600);
            
            // Occasionally add lightning bolt symbol
            if (Math.random() > 0.7) {
                const bolt = document.createElement('div');
                bolt.className = 'lightning-bolt';
                bolt.innerHTML = '⚡';
                bolt.style.left = (x + (Math.random() - 0.5) * 40) + 'px';
                bolt.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
                document.body.appendChild(bolt);
                setTimeout(() => bolt.remove(), 400);
            }
        }
        
        // Mouse move handler
        document.addEventListener('mousemove', (e) => {
            const now = Date.now();
            // Create spark every 50ms while moving
            if (now - lastSparkTime > 50) {
                createElectricSpark(e.clientX, e.clientY);
                lastSparkTime = now;
            }
        });
        
        // Touch move handler for mobile
        document.addEventListener('touchmove', (e) => {
            const now = Date.now();
            if (now - lastSparkTime > 50 && e.touches.length > 0) {
                const touch = e.touches[0];
                createElectricSpark(touch.clientX, touch.clientY);
                lastSparkTime = now;
            }
        }, { passive: true });

        init();
    </script>
</body>
